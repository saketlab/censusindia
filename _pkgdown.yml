url: https://saketlab.github.io/censusindia/

development:
  mode: auto

template:
  bootstrap: 5
  light-switch: true
  preset: default
  bslib:
    primary: "#0071e3"
    border-radius: "0.5rem"
  includes:
    in_header: |
      <meta name="keywords" content="India Census, R package, census data, demographics, population, districts, states, 1901-2011, choropleth maps, spatial analysis, India statistics">
      <meta name="author" content="Saket Choudhary">
      <meta name="robots" content="index, follow">
      <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
      <link rel="canonical" href="https://saketlab.github.io/censusindia/">
      <meta property="og:type" content="website">
      <meta property="og:url" content="https://saketlab.github.io/censusindia/">
      <meta property="og:title" content="censusindia - India Census Data for R">
      <meta property="og:description" content="R package for accessing digitised India Census data from 1901-2011. Includes population time series, administrative boundaries, and tools for choropleth mapping.">
      <meta property="og:site_name" content="censusindia">
      <meta property="og:locale" content="en_US">
      <meta name="twitter:card" content="summary_large_image">
      <meta name="twitter:title" content="censusindia - India Census Data for R">
      <meta name="twitter:description" content="R package for accessing digitised India Census data from 1901-2011.">
      <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "censusindia",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Windows, macOS, Linux",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "description": "R package for accessing digitised India Census data from 1901-2011 including population time series, administrative boundaries, and choropleth mapping tools",
        "author": {
          "@type": "Person",
          "name": "Saket Choudhary",
          "url": "https://saketlab.org"
        },
        "url": "https://saketlab.github.io/censusindia/",
        "downloadUrl": "https://github.com/saketlab/censusindia",
        "softwareVersion": "0.1.0",
        "programmingLanguage": "R"
      }
      </script>

home:
  title: "censusindia - India Census Data for R"
  description: >
    Digitised Census of India data from 1901 to 2011 for R. Population, literacy,
    SC/ST, workers, mother tongue, and tribal data with geographic boundaries for mapping.

  links:
  - text: Browse source code
    href: https://github.com/saketlab/censusindia
  - text: Report a bug
    href: https://github.com/saketlab/censusindia/issues

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github, lightswitch]

  components:
    reference:
      text: Reference
      href: reference/index.html

    articles:
      text: Articles
      menu:
      - text: Population maps
        href: articles/population-maps.html
      - text: Population dynamics
        href: articles/population-dynamics.html
      - text: Sex ratio evolution
        href: articles/sex-ratio.html
      - text: SC/ST population distribution
        href: articles/sc-st-population.html
      - text: Social composition
        href: articles/social-composition.html
      - text: Linguistic diversity
        href: articles/linguistic-diversity.html
      - text: Tribal isolation and vulnerability
        href: articles/tribal-isolation.html
      - text: District population overview
        href: articles/district-population.html

    news:
      text: Changelog
      href: news/index.html

    github:
      icon: fab fa-github fa-lg
      href: https://github.com/saketlab/censusindia
      aria-label: GitHub

reference:
- title: "Census Datasets"
  desc: "Census data"
  contents:
  - census_population_time_series
  - census_1961_literacy
  - census_1971
  - census_1981
  - census_2011_pca
  - census_2011_demographics
  - census_2011_workers
  - census_2011_marginal_detail
  - census_2011_mother_tongue
  - census_2011_district_languages
  - census_2011_subdistrict_languages
  - census_2011_linguistic_diversity
  - census_2011_sc_st
  - census_2011_tribes
  - census_subdistricts_2011
  - census_variables
  - india_states

- title: "Population Projections"
  desc: "MOHFW population projections (2011-2036)"
  contents:
  - get_population
  - population_projections_state
  - population_projections_district
  - population_projections_district_lgd

- title: "Census Data Access"
  desc: "Retrieve census datasets"
  contents:
  - get_census

- title: "Geographic Boundaries"
  desc: "Administrative boundaries"
  contents:
  - get_census_boundaries
  - attach_geometry
  - clear_geometry_cache

- title: "Mapping & Visualization"
  desc: "Choropleth maps"
  contents:
  - plotting
  - plot_map
  - compare_maps
  - get_palette

- title: "Variable Discovery"
  desc: "Available census variables"
  contents:
  - list_census_variables
  - list_census_geographies
  - list_states
  - search_census_variables

authors:
  Saket Choudhary:
    href: https://github.com/saketkc

footer:
  structure:
    left: developed_by
    right: built_with
  components:
    developed_by: "Developed by [Saket Lab](https://saketlab.org)"
    built_with: "Built with [pkgdown](https://pkgdown.r-lib.org/)"
